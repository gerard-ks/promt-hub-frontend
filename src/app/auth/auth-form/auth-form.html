<p-card [header]="mode() === 'login' ? 'Connexion' : 'Inscription'">
  <form [formGroup]="form" (ngSubmit)="submit()">
    <div class="field">
      <label for="username">Nom d'utilisateur</label>
      <input id="username" formControlName="username" type="text" pInputText class="w-full"/>
      <small class="invalid-feedback">Le nom d'utilisateur est requis</small>
    </div>

    <div class="field">
      <label for="password">Mot de passe</label>
      <p-password inputId="password" inputStyleClass="w-full" formControlName="password" class="w-full"/>
      <small class="invalid-feedback">Le mot de passe est requis (min 4 carac.)</small>
    </div>

    <div class="flex gap-2 justify-content-end">
      <p-button
        [loading]="submitting()"
        severity="secondary"
        [label]="mode() === 'login' ? 'Créer un compte' : 'Se Connecter'"
        (onClick)="toogleMode()"
      />
      <p-button
        [loading]="submitting()"
         type="submit"
         [label]="mode() === 'login' ? 'Connexion' : 'Créer le compte'"
      />
    </div>
  </form>
</p-card>
